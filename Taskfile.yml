version: "3"

tasks:
  # ---------------------------------------------------------------------------
  # Docker
  # ---------------------------------------------------------------------------

  up:
    desc: Start the indexer with an external Ergo node (set NODE_URL in .env)
    cmds:
      - docker compose up -d

  up:local-node:
    desc: Start the indexer with the bundled local Ergo node
    cmds:
      - docker compose --profile local-node up -d

  down:
    desc: Stop all containers
    cmds:
      - docker compose --profile local-node down

  clean:
    desc: Remove all containers, images, and volumes
    cmds:
      - docker compose --profile local-node down -v --rmi all

  # ---------------------------------------------------------------------------
  # Snapshots
  # ---------------------------------------------------------------------------

  snapshot:produce:
    desc: Produce a database snapshot at the given height
    cmds:
      - ./scripts/snapshot.sh produce {{.HEIGHT}}
    requires:
      vars: [HEIGHT]

  snapshot:restore:
    desc: Restore a database snapshot from a tarball
    cmds:
      - ./scripts/snapshot.sh restore {{.TARBALL}}
    requires:
      vars: [TARBALL]

  # ---------------------------------------------------------------------------
  # Development
  # ---------------------------------------------------------------------------

  install:
    desc: Install Python dependencies with pixi
    cmds:
      - pixi install

  test:
    desc: Run the test suite
    deps: [install]
    cmds:
      - pixi run test
