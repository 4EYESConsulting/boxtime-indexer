version: "3"

tasks:
  # ---------------------------------------------------------------------------
  # Docker
  # ---------------------------------------------------------------------------

  up:
    desc: Start the indexer with local node
    cmds:
      - docker compose --profile local-node up -d

  up:remote-node:
    desc: Start the indexer with remote node (set NODE_URL in .env)
    cmds:
      - docker compose up -d

  down:
    desc: Stop all containers
    cmds:
      - docker compose --profile local-node down

  clean:
    desc: Remove all containers, images, and volumes
    cmds:
      - docker compose --profile local-node down -v --rmi all

  # ---------------------------------------------------------------------------
  # Development
  # ---------------------------------------------------------------------------

  install:
    desc: Install Python dependencies with pixi
    cmds:
      - pixi install

  test:
    desc: Run the test suite
    deps: [install]
    cmds:
      - pixi run test

  status:
    desc: Check indexer sync status (local CSVs, with docker fallback)
    cmds:
      - |
        if [ -f output/cointime.csv ] || [ -f input/cointime.csv ]; then
          python3 -m src.status
        elif [ -n "$(docker compose ps -q indexer 2>/dev/null)" ]; then
          docker compose exec -T indexer pixi run python -m src.status
        else
          python3 -m src.status
        fi

  status:local:
    desc: Check indexer sync status from local CSV files (no pixi required)
    cmds:
      - python3 -m src.status

  status:docker:
    desc: Check indexer sync status from running indexer container
    cmds:
      - docker compose exec -T indexer pixi run python -m src.status

  status:pixi:
    desc: Check indexer sync status via pixi environment
    cmds:
      - pixi run python -m src.status
