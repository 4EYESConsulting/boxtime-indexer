version: "3"

tasks:
  # ---------------------------------------------------------------------------
  # Docker
  # ---------------------------------------------------------------------------

  up:
    desc: Start the indexer with local DB and local node
    cmds:
      - docker compose --profile local-db --profile local-node up -d

  up:remote-node:
    desc: Start the indexer with local DB and remote node (set NODE_URL in .env)
    cmds:
      - docker compose --profile local-db up -d

  up:remote-db:
    desc: Start the indexer with remote DB and local node (set DATABASE_URL in .env)
    cmds:
      - docker compose --profile local-node up -d

  up:remote:
    desc: Start the indexer with remote DB and remote node (set DATABASE_URL and NODE_URL in .env)
    cmds:
      - docker compose up -d

  down:
    desc: Stop all containers
    cmds:
      - docker compose --profile local-db --profile local-node down

  clean:
    desc: Remove all containers, images, and volumes
    cmds:
      - docker compose --profile local-db --profile local-node down -v --rmi all

  status:
    desc: Print indexing status from the database
    cmds:
      - ./scripts/status.sh

  # ---------------------------------------------------------------------------
  # Snapshots
  # ---------------------------------------------------------------------------

  snapshot:produce:
    desc: Produce a database snapshot at the given height
    cmds:
      - ./scripts/snapshot.sh produce {{.HEIGHT}}
    requires:
      vars: [HEIGHT]

  snapshot:restore:
    desc: Restore a database snapshot from a tarball
    cmds:
      - ./scripts/snapshot.sh restore {{.TARBALL}}
    requires:
      vars: [TARBALL]

  # ---------------------------------------------------------------------------
  # Development
  # ---------------------------------------------------------------------------

  install:
    desc: Install Python dependencies with pixi
    cmds:
      - pixi install

  test:
    desc: Run the test suite
    deps: [install]
    cmds:
      - pixi run test
