services:
  node:
    image: ergoplatform/ergo:latest
    volumes:
      - nodedata:/home/ergo/.ergo
      - ./ergo.conf:/home/ergo/ergo.conf:ro
    command: ["--mainnet", "-c", "/home/ergo/ergo.conf"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9053/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    env_file: .env

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boxtime
      POSTGRES_PASSWORD: boxtime
      POSTGRES_DB: boxtime
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxtime"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build: .
    depends_on:
      node:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

volumes:
  nodedata:
  pgdata:
