services:
  node:
    image: ergoplatform/ergo:latest
    profiles: [local-node]
    volumes:
      - nodedata:/home/ergo/.ergo
      - ./ergo.conf:/home/ergo/ergo.conf:ro
    command: ["--mainnet", "-c", "/home/ergo/ergo.conf"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9053/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    env_file: .env

  indexer:
    build: .
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    env_file: .env
    restart: unless-stopped

volumes:
  nodedata:
